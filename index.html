<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Синхронизация текста</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="page">
    <header class="header">
      <h1>Общий текст</h1>
      <p class="subtitle">
        Изменения на одном устройстве отображаются на другом
      </p>
    </header>

    <main class="main">
      <section class="card">
        <label for="sharedText" class="label">Текст</label>
        <textarea
          id="sharedText"
          placeholder="Введите текст..."
        ></textarea>

        <div class="buttons">
          <button id="saveButton">Сохранить</button>
          <button id="clearButton" class="secondary">Очистить</button>
        </div>

        <p id="status" class="status">Подключение...</p>
      </section>
    </main>
  </div>

  <script type="module" src="script.js"></script>
</body>
</html>
